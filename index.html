<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cyber Career Roadmap</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#00d4ff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="CyberRoadmap">
  <link rel="apple-touch-icon" href="icon-192.png">
  <meta name="mobile-web-app-capable" content="yes">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    /* ── DARK THEME (default) ── */
    body {
      background: #03060f;
      color: #c8d8f0;
      font-family: 'Rajdhani', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
      transition: background 0.4s, color 0.4s;
    }

    /* ── LIGHT THEME ── */
    body.light {
      background: #ffffff;
      color: #1a2340;
    }
    body.light ::-webkit-scrollbar-track { background: #ffffff; }
    body.light ::-webkit-scrollbar-thumb { background: #00d4ff50; }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #03060f; }
    ::-webkit-scrollbar-thumb { background: #00d4ff30; border-radius: 2px; }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,212,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,255,0.025) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
      transition: opacity 0.4s;
    }
    body.light::before { opacity: 0.6; }

    body::after {
      content: '';
      position: fixed;
      top: -200px; left: 50%;
      transform: translateX(-50%);
      width: 700px; height: 500px;
      background: radial-gradient(ellipse, rgba(0,212,255,0.06) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    @keyframes scanline {
      0%   { top: -3px; }
      100% { top: 100vh; }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulseDot {
      0%, 100% { opacity: 0.5; transform: scale(1); box-shadow: 0 0 4px #00d4ff; }
      50%       { opacity: 1;   transform: scale(1.4); box-shadow: 0 0 12px #00d4ff; }
    }
    @keyframes xpPop {
      0%   { transform: translateY(0) scale(1); opacity: 1; }
      100% { transform: translateY(-40px) scale(1.3); opacity: 0; }
    }
    @keyframes levelUp {
      0%   { transform: scale(0.8); opacity: 0; }
      60%  { transform: scale(1.15); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
  const { useState, useEffect, useRef, useCallback } = React;
  const STORAGE_KEY = "cyber-roadmap-v3";

  // ── XP CONFIG ──
  const XP_VALUES = { CERT: 150, SKILL: 100, TOOL: 80, FRAMEWORK: 120, TRAINING: 90 };
  const LEVELS = [
    { level: 1,  title: "Iron",     xpRequired: 0,    color: "#9ca3af" },
    { level: 2,  title: "Bronze",   xpRequired: 200,  color: "#cd7f32" },
    { level: 3,  title: "Steel",    xpRequired: 500,  color: "#64748b" },
    { level: 4,  title: "Silver",   xpRequired: 900,  color: "#94a3b8" },
    { level: 5,  title: "Gold",     xpRequired: 1400, color: "#eab308" },
    { level: 6,  title: "Platinum", xpRequired: 2000, color: "#cbd5e1" },
    { level: 7,  title: "Titanium", xpRequired: 2700, color: "#60a5fa" },
    { level: 8,  title: "Obsidian", xpRequired: 3500, color: "#7c3aed" },
    { level: 9,  title: "Diamond",  xpRequired: 4200, color: "#22d3ee" },
    { level: 10, title: "Phantom",  xpRequired: 5000, color: "#e879f9" },
  ];

  // ── DIFFICULTY & HOURS ──
  const DIFFICULTY = { 1: { label: "EASY",   color: "#22c55e", stars: 1 },
                       2: { label: "MEDIUM", color: "#f59e0b", stars: 2 },
                       3: { label: "HARD",   color: "#f87171", stars: 3 } };

  const PHASES = [
    {
      id: "foundation", label: "Phase 01", sublabel: "Foundation",
      subtitle: "Core IT & scripting fundamentals",
      icon: "◈", color: "#00d4ff", dark: "rgba(0,30,45,0.8)",
      salary: "$50k – $70k",
      items: [
        { title: "CompTIA A+",      desc: "Hardware, OS, troubleshooting — start here", tag: "CERT",      diff: 2, hours: 120 },
        { title: "CompTIA N+",      desc: "Networking fundamentals, TCP/IP, routing",   tag: "CERT",      diff: 2, hours: 100 },
        { title: "CompTIA S+",      desc: "Security baseline — required for most cyber roles", tag: "CERT", diff: 2, hours: 100 },
        { title: "CompTIA Linux+",  desc: "Validates Linux skills — stacks with RHCSA and sysadmin degree", tag: "CERT", diff: 2, hours: 80  },
        { title: "Linux / Bash",    desc: "CLI navigation, scripting, file permissions", tag: "SKILL",    diff: 2, hours: 60  },
        { title: "PowerShell",      desc: "Windows automation, AD management",           tag: "SKILL",    diff: 2, hours: 40  },
        { title: "Python",          desc: "Scripting, automation, tool building",        tag: "SKILL",    diff: 2, hours: 80  },
        { title: "SQL",             desc: "Queries, joins, database fundamentals",       tag: "SKILL",    diff: 1, hours: 30  },
        { title: "Git / GitHub",    desc: "Version control, repos, collaboration",       tag: "SKILL",    diff: 1, hours: 20  },
        { title: "Microsoft AZ-900",  desc: "Azure fundamentals — easy entry point",     tag: "CERT",     diff: 1, hours: 30  },
        { title: "Microsoft SC-900",  desc: "Security, compliance, identity fundamentals", tag: "CERT",   diff: 1, hours: 30  },
        { title: "Windows Server 2022", desc: "ADDS, group policy, file services — core sysadmin", tag: "SKILL", diff: 2, hours: 60 },
        { title: "Cisco IOS / CLI",   desc: "Routing, switching, firewall config — networking fundamentals", tag: "TOOL", diff: 2, hours: 50 },
        { title: "Active Directory / SSO / LDAP", desc: "Enterprise identity and access management", tag: "SKILL", diff: 3, hours: 50 },
      ]
    },
    {
      id: "security", label: "Phase 02", sublabel: "Security Core",
      subtitle: "Offensive & defensive fundamentals",
      icon: "◉", color: "#ff3c3c", dark: "rgba(40,5,5,0.8)",
      salary: "$75k – $100k",
      items: [
        { title: "TryHackMe SEC0",  desc: "Introduction to cybersecurity fundamentals", tag: "TRAINING", diff: 1, hours: 20  },
        { title: "TryHackMe SEC1",  desc: "Hands-on attack & defense labs",             tag: "TRAINING", diff: 2, hours: 40  },
        { title: "TryHackMe SAL1",  desc: "Security analyst learning path",             tag: "TRAINING", diff: 2, hours: 50  },
        { title: "CompTIA CySA+",   desc: "Threat detection, analysis, and response",   tag: "CERT",     diff: 3, hours: 120 },
        { title: "Wireshark",       desc: "Packet capture and traffic analysis",        tag: "TOOL",     diff: 2, hours: 30  },
        { title: "Nmap",            desc: "Network scanning and enumeration",           tag: "TOOL",     diff: 1, hours: 15  },
        { title: "Tcpdump",         desc: "CLI packet analysis",                        tag: "TOOL",     diff: 2, hours: 15  },
        { title: "Autopsy",         desc: "Digital forensics platform — investigate drives, deleted files, timelines", tag: "TOOL", diff: 2, hours: 30  },
        { title: "Volatility",      desc: "Memory forensics — analyze RAM dumps for malware and hidden activity", tag: "TOOL", diff: 3, hours: 35 },
        { title: "MITRE ATT&CK",    desc: "Adversary tactics and techniques framework", tag: "FRAMEWORK",diff: 2, hours: 25  },
        { title: "OWASP Top 10",    desc: "Web application security vulnerabilities",   tag: "FRAMEWORK",diff: 2, hours: 20  },
        { title: "Splunk",          desc: "SIEM log analysis and threat hunting",       tag: "TOOL",     diff: 2, hours: 40  },

        { title: "Elastic / ELK Stack", desc: "Open source SIEM and log analysis platform", tag: "TOOL",  diff: 2, hours: 40  },
        { title: "Security Onion",  desc: "Free open source SIEM used in real SOCs and training", tag: "TOOL", diff: 2, hours: 30 },
      ]
    },
    {
      id: "cloud", label: "Phase 03", sublabel: "Cloud & Microsoft",
      subtitle: "Azure security engineering stack",
      icon: "⬡", color: "#0ea5e9", dark: "rgba(0,20,40,0.8)",
      salary: "$100k – $140k",
      items: [

        { title: "Microsoft AZ-104",              desc: "Azure Administrator — core cloud ops",          tag: "CERT",  diff: 3, hours: 120 },
        { title: "Microsoft AZ-500",              desc: "Azure Security Engineer — high value cert",     tag: "CERT",  diff: 3, hours: 120 },
        { title: "Microsoft SC-200",              desc: "Security Operations Analyst",                   tag: "CERT",  diff: 3, hours: 100 },

        { title: "Microsoft Entra",               desc: "Identity platform, IAM, conditional access",   tag: "TOOL",  diff: 2, hours: 30  },
        { title: "Microsoft Defender",            desc: "Endpoint, cloud, and identity protection",     tag: "TOOL",  diff: 2, hours: 30  },
        { title: "Microsoft Sentinel",            desc: "Cloud-native SIEM and SOAR",                   tag: "TOOL",  diff: 3, hours: 50  },
        { title: "Azure Monitor / Log Analytics", desc: "Monitoring, alerting, log queries",            tag: "TOOL",  diff: 2, hours: 30  },
        { title: "KQL",                           desc: "Kusto Query Language for Sentinel & Defender", tag: "SKILL", diff: 2, hours: 30  },
      ]
    },
    {
      id: "advanced", label: "Phase 04", sublabel: "Advanced & GRC",
      subtitle: "Architecture, compliance, and mastery",
      icon: "✦", color: "#a855f7", dark: "rgba(20,5,40,0.8)",
      salary: "$140k – $200k+",
      items: [
        { title: "VMware / vSphere",             desc: "Virtualization platform management",              tag: "TOOL",      diff: 2, hours: 40  },
        { title: "Terraform",                    desc: "Infrastructure as code",                         tag: "TOOL",      diff: 3, hours: 60  },
        { title: "Docker",                       desc: "Containerization fundamentals",                  tag: "TOOL",      diff: 2, hours: 40  },


        { title: "Group Policy (GPO)",          desc: "Security hardening via GPO — daily task in DoD environments", tag: "SKILL", diff: 2, hours: 30 },
        { title: "NIST 800-53",                  desc: "Security and privacy controls framework",        tag: "FRAMEWORK", diff: 3, hours: 50  },
        { title: "RMF 800-37",                   desc: "DoD Risk Management Framework",                  tag: "FRAMEWORK", diff: 3, hours: 50  },
        { title: "RHCSA",                        desc: "Red Hat Certified System Administrator — DoD Linux standard", tag: "CERT", diff: 3, hours: 120 },
        { title: "DoD 8570 / 8140",             desc: "DoD approved cert framework — know exactly what you need by role", tag: "FRAMEWORK", diff: 1, hours: 20  },
        { title: "DISA STIG",                    desc: "DoD security technical implementation guides",   tag: "FRAMEWORK", diff: 3, hours: 40  },
        { title: "CIS Benchmarks",              desc: "Security hardening standards — pairs with DISA STIG", tag: "FRAMEWORK", diff: 2, hours: 30 },
        { title: "Tenable Nessus",              desc: "Vulnerability scanning — daily tool in DoD security roles",  tag: "TOOL",      diff: 2, hours: 30  },
        { title: "Ansible",                     desc: "Configuration management and automation — pairs with Terraform", tag: "TOOL",     diff: 2, hours: 40  },
        { title: "CyberRange",                   desc: "Hands-on attack/defense simulation environments",tag: "TRAINING",  diff: 3, hours: 80  },
        { title: "GRC Mastery",                  desc: "Governance, Risk & Compliance — executive level",tag: "SKILL",     diff: 3, hours: 60  },
      ]
    },
  ];

  const TAG_META = {
    CERT:      { bg: "#001828", text: "#00d4ff", border: "#004466", label: "CERT" },
    SKILL:     { bg: "#001a08", text: "#22c55e", border: "#14532d", label: "SKILL" },
    TOOL:      { bg: "#130820", text: "#c084fc", border: "#4c1d95", label: "TOOL" },
    FRAMEWORK: { bg: "#1a0f00", text: "#f59e0b", border: "#78350f", label: "FW" },
    TRAINING:  { bg: "#1a0505", text: "#f87171", border: "#7f1d1d", label: "LAB" },
  };

  function getLevelInfo(xp) {
    let current = LEVELS[0];
    let next = LEVELS[1];
    for (let i = LEVELS.length - 1; i >= 0; i--) {
      if (xp >= LEVELS[i].xpRequired) {
        current = LEVELS[i];
        next = LEVELS[i + 1] || null;
        break;
      }
    }
    const xpInLevel = xp - current.xpRequired;
    const xpNeeded = next ? next.xpRequired - current.xpRequired : 1;
    const pct = next ? Math.round((xpInLevel / xpNeeded) * 100) : 100;
    return { current, next, pct, xpInLevel, xpNeeded };
  }

  function Tag({ type, light }) {
    const m = TAG_META[type] || TAG_META.SKILL;
    return (
      <span style={{
        fontSize: 8, fontFamily: "'Share Tech Mono', monospace",
        letterSpacing: 2, padding: "2px 7px", borderRadius: 2,
        background: light ? "rgba(0,0,0,0.06)" : m.bg,
        color: m.text, border: `1px solid ${m.border}`,
        whiteSpace: "nowrap", flexShrink: 0,
      }}>{m.label}</span>
    );
  }

  function Stars({ count, color, darkMode }) {
    return (
      <span style={{ display: "flex", gap: 2, alignItems: "center" }}>
        {[1,2,3].map(i => (
          <span key={i} style={{
            width: 6, height: 6, borderRadius: "50%",
            background: i <= count ? color : (darkMode ? "rgba(255,255,255,0.1)" : "rgba(0,0,0,0.15)"),
            display: "inline-block",
            boxShadow: i <= count ? `0 0 4px ${color}` : "none",
            transition: "all 0.2s",
          }} />
        ))}
      </span>
    );
  }

  function ProgressRing({ pct, color, size = 38, darkMode }) {
    const r = (size - 5) / 2;
    const circ = 2 * Math.PI * r;
    const dash = (pct / 100) * circ;
    return (
      <svg width={size} height={size} style={{ transform: "rotate(-90deg)", flexShrink: 0 }}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={darkMode ? "rgba(255,255,255,0.08)" : "rgba(0,0,0,0.12)"} strokeWidth="3" />
        <circle cx={size/2} cy={size/2} r={r} fill="none"
          stroke={pct === 100 ? "#22c55e" : color}
          strokeWidth="3" strokeDasharray={`${dash} ${circ}`}
          strokeLinecap="round"
          style={{
            transition: "stroke-dasharray 0.4s ease",
            filter: `drop-shadow(0 0 4px ${pct === 100 ? "#22c55e" : color})`
          }}
        />
      </svg>
    );
  }

  function XPPopup({ xp, color }) {
    return (
      <div style={{
        position: "fixed", top: "50%", left: "50%",
        transform: "translate(-50%,-50%)",
        fontFamily: "'Orbitron'", fontSize: 22, fontWeight: 900,
        color: color, textShadow: `0 0 20px ${color}`,
        animation: "xpPop 1s ease forwards",
        pointerEvents: "none", zIndex: 9999,
        letterSpacing: 2,
      }}>+{xp} XP</div>
    );
  }

  function App() {
    const [openPhase, setOpenPhase] = useState("foundation");
    const [darkMode, setDarkMode] = useState(true);
    const [completed, setCompleted] = useState(() => {
      try {
        const s = localStorage.getItem(STORAGE_KEY);
        return s ? new Set(JSON.parse(s)) : new Set();
      } catch { return new Set(); }
    });
    const [justSaved, setJustSaved] = useState(false);
    const [xpPopup, setXpPopup] = useState(null);
    const [prevLevel, setPrevLevel] = useState(1);
    const [showLevelUp, setShowLevelUp] = useState(false);

    // Apply dark/light mode
    useEffect(() => {
      document.body.classList.toggle("light", !darkMode);
    }, [darkMode]);

    useEffect(() => {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify([...completed])); } catch {}
      setJustSaved(true);
      const t = setTimeout(() => setJustSaved(false), 1800);
      return () => clearTimeout(t);
    }, [completed]);

    // Calculate total XP
    const totalXP = [...completed].reduce((sum, key) => {
      const [phaseId, idx] = key.split("-");
      const phase = PHASES.find(p => p.id === phaseId);
      if (!phase) return sum;
      const item = phase.items[parseInt(idx)];
      if (!item) return sum;
      return sum + (XP_VALUES[item.tag] || 0);
    }, 0);

    const levelInfo = getLevelInfo(totalXP);
    const totalItems = PHASES.reduce((a, p) => a + p.items.length, 0);
    const doneCount = completed.size;
    const progress = Math.round((doneCount / totalItems) * 100);
    const activeColor = progress >= 75 ? "#a855f7" : progress >= 50 ? "#0ea5e9" : progress >= 25 ? "#ff3c3c" : "#00d4ff";

    // Total estimated hours
    const totalHours = PHASES.reduce((sum, p) => sum + p.items.reduce((s, i) => s + i.hours, 0), 0);
    const doneHours = [...completed].reduce((sum, key) => {
      const [phaseId, idx] = key.split("-");
      const phase = PHASES.find(p => p.id === phaseId);
      if (!phase) return sum;
      const item = phase.items[parseInt(idx)];
      return sum + (item ? item.hours : 0);
    }, 0);

    const toggle = (phaseId, idx) => {
      const key = `${phaseId}-${idx}`;
      const phase = PHASES.find(p => p.id === phaseId);
      const item = phase?.items[idx];
      const xpVal = XP_VALUES[item?.tag] || 0;
      const phaseColor = phase?.color || "#00d4ff";

      setCompleted(prev => {
        const next = new Set(prev);
        if (next.has(key)) {
          next.delete(key);
        } else {
          next.add(key);
          // Show XP popup
          setXpPopup({ xp: xpVal, color: phaseColor, id: Date.now() });
          setTimeout(() => setXpPopup(null), 1000);
        }
        return next;
      });
    };

    // Check for level up
    useEffect(() => {
      if (levelInfo.current.level > prevLevel) {
        setShowLevelUp(true);
        setPrevLevel(levelInfo.current.level);
        setTimeout(() => setShowLevelUp(false), 3000);
      }
    }, [levelInfo.current.level]);

    const bg = darkMode ? "#03060f" : "#ffffff";
    const cardBg = darkMode ? "rgba(255,255,255,0.015)" : "#ffffff";
    const textMuted = darkMode ? "rgba(255,255,255,0.3)" : "rgba(0,0,0,0.65)";
    const textMain = darkMode ? "#e8f0ff" : "#0a0f1e";
    const borderMuted = darkMode ? "rgba(255,255,255,0.07)" : "rgba(0,0,0,0.18)";
    const borderSub = darkMode ? "rgba(255,255,255,0.05)" : "rgba(0,0,0,0.10)";

    return (
      <div style={{ position: "relative", zIndex: 1, maxWidth: 540, margin: "0 auto", padding: "0 0 80px" }}>

        {/* XP Popup */}
        {xpPopup && <XPPopup key={xpPopup.id} xp={xpPopup.xp} color={xpPopup.color} />}

        {/* Level Up Banner */}
        {showLevelUp && (
          <div style={{
            position: "fixed", top: 20, left: "50%", transform: "translateX(-50%)",
            background: "linear-gradient(135deg, rgba(168,85,247,0.95), rgba(0,212,255,0.95))",
            padding: "12px 28px", borderRadius: 40, zIndex: 9998,
            fontFamily: "'Orbitron'", fontSize: 14, fontWeight: 900,
            color: "#fff", letterSpacing: 2,
            animation: "levelUp 0.4s ease",
            boxShadow: "0 0 40px rgba(168,85,247,0.6)",
          }}>
            ⬆ LEVEL UP — {levelInfo.current.title.toUpperCase()}
          </div>
        )}

        {/* Scanline */}
        {darkMode && (
          <div style={{ position: "fixed", inset: 0, pointerEvents: "none", zIndex: 999, overflow: "hidden" }}>
            <div style={{
              position: "absolute", left: 0, right: 0, height: "3px",
              background: "linear-gradient(transparent 0%, rgba(0,212,255,0.05) 50%, transparent 100%)",
              animation: "scanline 7s linear infinite",
            }} />
          </div>
        )}

        {/* ══ HERO HEADER ══ */}
        <div style={{
          padding: "40px 22px 30px", marginBottom: 20,
          position: "relative", animation: "fadeUp 0.5s ease both",
        }}>
          {/* Status bar */}
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 22 }}>
            <div style={{
              display: "flex", alignItems: "center", gap: 8,
              fontFamily: "'Share Tech Mono'", fontSize: 10,
              color: "#00d4ff", letterSpacing: 3,
            }}>
              <span style={{
                width: 7, height: 7, borderRadius: "50%",
                background: "#00d4ff", display: "inline-block",
                animation: "pulseDot 2.5s infinite",
              }} />
              CYBER CAREER ROADMAP
            </div>
            <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
              {/* Dark/Light Toggle */}
              <button onClick={() => setDarkMode(d => !d)} style={{
                background: darkMode ? "rgba(0,212,255,0.1)" : "rgba(0,212,255,0.08)",
                border: `1px solid ${darkMode ? "rgba(0,212,255,0.3)" : "rgba(0,212,255,0.2)"}`,
                borderRadius: 20, padding: "4px 10px",
                cursor: "pointer", color: "#00d4ff",
                fontFamily: "'Share Tech Mono'", fontSize: 10, letterSpacing: 1,
                transition: "all 0.3s",
              }}>
                {darkMode ? "☀ LIGHT" : "◑ DARK"}
              </button>
              <div style={{
                fontFamily: "'Share Tech Mono'", fontSize: 9,
                color: justSaved ? "#22c55e" : (darkMode ? "rgba(255,255,255,0.3)" : "rgba(0,0,0,0.55)"),
                letterSpacing: 2, transition: "color 0.4s",
              }}>
                {justSaved ? "SAVED ✓" : "SYS:READY"}
              </div>
            </div>
          </div>

          {/* BIG TITLE */}
          <div style={{
            fontFamily: "'Orbitron', monospace",
            fontSize: "clamp(28px, 7vw, 38px)", fontWeight: 900,
            letterSpacing: "0.05em", lineHeight: 1.05, marginBottom: 8,
            background: darkMode
              ? "linear-gradient(120deg, #ffffff 0%, #b8e8ff 40%, #00d4ff 70%, #0ea5e9 100%)"
              : "none",
            WebkitBackgroundClip: darkMode ? "text" : "unset",
            WebkitTextFillColor: darkMode ? "transparent" : "#0a0f1e",
            backgroundClip: darkMode ? "text" : "unset",
            color: darkMode ? "unset" : "#0a0f1e",
          }}>
            CYBER CAREER<br/>ROADMAP
          </div>

          <div style={{
            fontFamily: "'Rajdhani'", fontSize: 16, fontWeight: 700,
            letterSpacing: 5, color: "#00d4ff", marginBottom: 6, textTransform: "uppercase",
          }}>
            Security Engineer Path
          </div>

          <div style={{ fontFamily: "'Share Tech Mono'", fontSize: 10, color: textMuted, letterSpacing: 2 }}>
            CAREER CERTIFICATION ROADMAP // {new Date().getFullYear()}
          </div>

          <div style={{
            position: "absolute", bottom: 0, left: 22, right: 22, height: 1,
            background: "linear-gradient(90deg, transparent 0%, #00d4ff50 30%, #0ea5e940 70%, transparent 100%)",
          }} />
        </div>

        {/* ══ XP / LEVEL CARD ══ */}
        <div style={{
          margin: "0 16px 12px",
          background: darkMode
            ? `linear-gradient(135deg, ${levelInfo.current.color}30 0%, rgba(1,3,10,1) 100%)`
            : `linear-gradient(135deg, ${levelInfo.current.color}20 0%, #d8e4f0 100%)`,
          border: `1px solid ${levelInfo.current.color}${darkMode ? "40" : "80"}`,
          borderRadius: 12, padding: "16px 20px",
          position: "relative", animation: "fadeUp 0.5s 0.05s ease both",
          boxShadow: `0 0 24px ${levelInfo.current.color}15`,
        }}>
          {/* Corner brackets */}
          {[["top","left"],["top","right"],["bottom","left"],["bottom","right"]].map(([v,h], i) => (
            <div key={i} style={{
              position: "absolute", [v]: -1, [h]: -1, width: 14, height: 14,
              borderTop: v==="top" ? `2px solid ${levelInfo.current.color}` : "none",
              borderBottom: v==="bottom" ? `2px solid ${levelInfo.current.color}` : "none",
              borderLeft: h==="left" ? `2px solid ${levelInfo.current.color}` : "none",
              borderRight: h==="right" ? `2px solid ${levelInfo.current.color}` : "none",
              opacity: 0.7,
            }} />
          ))}

          <div style={{ display: "flex", alignItems: "center", gap: 16 }}>
            {/* Level badge */}
            <div style={{
              width: 52, height: 52, borderRadius: "50%", flexShrink: 0,
              background: `conic-gradient(${levelInfo.current.color} ${levelInfo.pct * 3.6}deg, rgba(255,255,255,0.05) 0deg)`,
              display: "flex", alignItems: "center", justifyContent: "center",
              boxShadow: `0 0 20px ${levelInfo.current.color}40`,
              position: "relative",
            }}>
              <div style={{
                width: 40, height: 40, borderRadius: "50%",
                background: darkMode ? "#03060f" : "#ffffff",
                display: "flex", alignItems: "center", justifyContent: "center",
                fontFamily: "'Orbitron'", fontSize: 16, fontWeight: 900,
                color: levelInfo.current.color,
              }}>{levelInfo.current.level}</div>
            </div>

            {/* Level info */}
            <div style={{ flex: 1 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}>
                <div style={{
                  fontFamily: "'Orbitron'", fontSize: 13, fontWeight: 700,
                  color: levelInfo.current.color, letterSpacing: 1,
                }}>{levelInfo.current.title.toUpperCase()}</div>
                <div style={{ fontFamily: "'Share Tech Mono'", fontSize: 9,
                  color: darkMode ? "rgba(255,255,255,0.6)" : "rgba(0,0,0,0.7)", letterSpacing: 1,
                }}>{totalXP.toLocaleString()} XP</div>
              </div>

              {/* XP Bar */}
              <div style={{
                height: 5, background: darkMode ? "rgba(255,255,255,0.05)" : "rgba(0,0,0,0.10)", borderRadius: 3,
                overflow: "hidden", marginBottom: 5,
              }}>
                <div style={{
                  height: "100%", width: `${levelInfo.pct}%`,
                  background: levelInfo.current.color,
                  borderRadius: 3, transition: "width 0.5s ease",
                  boxShadow: `0 0 8px ${levelInfo.current.color}`,
                }} />
              </div>

              <div style={{ display: "flex", justifyContent: "space-between" }}>
                <div style={{ fontFamily: "'Share Tech Mono'", fontSize: 8, color: darkMode ? "rgba(255,255,255,0.55)" : "rgba(0,0,0,0.65)", letterSpacing: 1 }}>
                  {levelInfo.next ? `${levelInfo.xpInLevel}/${levelInfo.xpNeeded} XP to ${levelInfo.next.title}` : "MAX LEVEL"}
                </div>
                <div style={{ fontFamily: "'Share Tech Mono'", fontSize: 8, color: darkMode ? "rgba(255,255,255,0.55)" : "rgba(0,0,0,0.65)", letterSpacing: 1 }}>
                  ~{doneHours}h / {totalHours}h
                </div>
              </div>
            </div>
          </div>
        </div>

        {/* ══ PROGRESS DASHBOARD ══ */}
        <div style={{
          margin: "0 16px 16px",
          background: darkMode
            ? "linear-gradient(135deg, rgba(0,212,255,0.15) 0%, rgba(1,3,10,1) 100%)"
            : "linear-gradient(135deg, rgba(0,150,200,0.12) 0%, #c8d8ec 100%)",
          border: darkMode ? "1px solid rgba(0,212,255,0.2)" : "1px solid rgba(0,100,180,0.35)",
          borderRadius: 12, padding: "20px 20px 16px",
          position: "relative", animation: "fadeUp 0.5s 0.08s ease both",
        }}>
          {[["top","left"],["top","right"],["bottom","left"],["bottom","right"]].map(([v,h], i) => (
            <div key={i} style={{
              position: "absolute", [v]: -1, [h]: -1, width: 16, height: 16,
              borderTop: v==="top" ? "2px solid #00d4ff" : "none",
              borderBottom: v==="bottom" ? "2px solid #00d4ff" : "none",
              borderLeft: h==="left" ? "2px solid #00d4ff" : "none",
              borderRight: h==="right" ? "2px solid #00d4ff" : "none",
              opacity: 0.6,
            }} />
          ))}

          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-end", marginBottom: 16 }}>
            <div>
              <div style={{ fontFamily: "'Share Tech Mono'", fontSize: 9, color: darkMode ? "rgba(255,255,255,0.6)" : "rgba(0,0,0,0.7)", letterSpacing: 3, marginBottom: 4 }}>
                COMPLETION
              </div>
              <div style={{ display: "flex", alignItems: "baseline", gap: 2, lineHeight: 1 }}>
                <span style={{
                  fontFamily: "'Orbitron'", fontSize: 42, fontWeight: 900,
                  color: activeColor, textShadow: darkMode ? `0 0 30px ${activeColor}50` : `0 2px 8px ${activeColor}40`,
                  transition: "color 0.5s, text-shadow 0.5s",
                }}>{progress}</span>
                <span style={{ fontFamily: "'Orbitron'", fontSize: 18, color: darkMode ? "rgba(255,255,255,0.5)" : "rgba(0,0,0,0.4)", fontWeight: 700 }}>%</span>
              </div>
            </div>
            <div style={{ textAlign: "right" }}>
              <div style={{ fontFamily: "'Share Tech Mono'", fontSize: 9, color: darkMode ? "rgba(255,255,255,0.6)" : "rgba(0,0,0,0.7)", letterSpacing: 3, marginBottom: 4 }}>
                ITEMS DONE
              </div>
              <div style={{ fontFamily: "'Orbitron'", fontSize: 24, fontWeight: 700, color: textMain, lineHeight: 1 }}>
                {doneCount}
                <span style={{ fontSize: 14, color: darkMode ? "rgba(255,255,255,0.5)" : "rgba(0,0,0,0.4)", fontWeight: 400 }}>/{totalItems}</span>
              </div>
            </div>
          </div>

          <div style={{
            height: 7, background: darkMode ? "rgba(255,255,255,0.05)" : "rgba(0,0,0,0.10)", borderRadius: 4,
            overflow: "hidden", marginBottom: 18,
          }}>
            <div style={{
              height: "100%", width: `${progress}%`,
              background: `linear-gradient(90deg, #00d4ff 0%, ${activeColor} 100%)`,
              borderRadius: 4, transition: "width 0.5s cubic-bezier(0.4,0,0.2,1)",
              boxShadow: `0 0 12px ${activeColor}70`,
            }} />
          </div>

          <div style={{ display: "flex", gap: 8 }}>
            {PHASES.map((p, pi) => {
              const done = p.items.filter((_, i) => completed.has(`${p.id}-${i}`)).length;
              const pct = Math.round((done / p.items.length) * 100);
              const isActive = openPhase === p.id;
              return (
                <div key={p.id} onClick={() => setOpenPhase(p.id === openPhase ? null : p.id)}
                  style={{
                    flex: 1, cursor: "pointer", padding: "10px 4px 8px",
                    borderRadius: 8,
                    background: isActive ? `${p.color}${darkMode ? "12" : "18"}` : (darkMode ? "rgba(255,255,255,0.02)" : "rgba(0,0,0,0.04)"),
                    border: `1px solid ${isActive ? p.color + "50" : borderMuted}`,
                    transition: "all 0.25s",
                    display: "flex", flexDirection: "column", alignItems: "center", gap: 5,
                    boxShadow: isActive ? `0 0 14px ${p.color}20` : "none",
                  }}>
                  <ProgressRing pct={pct} color={p.color} size={36} darkMode={darkMode} />
                  <div style={{
                    fontFamily: "'Share Tech Mono'", fontSize: 7,
                    color: isActive ? p.color : textMuted,
                    letterSpacing: 1, textAlign: "center", transition: "color 0.25s",
                  }}>PH0{pi+1}</div>
                </div>
              );
            })}
          </div>
        </div>

        {/* ══ PHASE CARDS ══ */}
        <div style={{ display: "flex", flexDirection: "column", gap: 8, padding: "0 16px", animation: "fadeUp 0.5s 0.15s ease both" }}>
          {PHASES.map((phase) => {
            const isOpen = openPhase === phase.id;
            const doneCnt = phase.items.filter((_, i) => completed.has(`${phase.id}-${i}`)).length;
            const pct = Math.round((doneCnt / phase.items.length) * 100);
            const allDone = doneCnt === phase.items.length;
            const phaseXP = phase.items.reduce((s, i) => s + (XP_VALUES[i.tag] || 0), 0);
            const phaseHours = phase.items.reduce((s, i) => s + i.hours, 0);

            return (
              <div key={phase.id} style={{
                borderRadius: 10, overflow: "hidden",
                border: `1px solid ${isOpen ? phase.color + "55" : borderMuted}`,
                transition: "border-color 0.3s, box-shadow 0.3s",
                boxShadow: isOpen ? `0 0 28px ${phase.color}15, inset 0 1px 0 ${phase.color}15` : "none",
              }}>

                {/* Header */}
                <div onClick={() => setOpenPhase(isOpen ? null : phase.id)} style={{
                  display: "flex", alignItems: "center", gap: 14, padding: "14px 16px",
                  background: isOpen
                    ? (darkMode ? phase.dark : `${phase.color}20`)
                    : (darkMode ? "rgba(255,255,255,0.015)" : "#e8eef8"),
                  cursor: "pointer", userSelect: "none", transition: "background 0.3s",
                  borderBottom: isOpen ? `1px solid ${phase.color}18` : "none",
                }}>

                  <div style={{ position: "relative", flexShrink: 0 }}>
                    <ProgressRing pct={pct} color={phase.color} size={48} darkMode={darkMode} />
                    <div style={{
                      position: "absolute", inset: 0, display: "flex",
                      alignItems: "center", justifyContent: "center",
                      fontSize: 17, color: isOpen ? phase.color : "rgba(255,255,255,0.2)",
                      transition: "color 0.3s",
                    }}>{phase.icon}</div>
                  </div>

                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 2 }}>
                      <span style={{
                        fontFamily: "'Share Tech Mono'", fontSize: 9,
                        color: isOpen ? phase.color : textMuted, letterSpacing: 3,
                      }}>{phase.label}</span>
                      <span style={{
                        fontFamily: "'Rajdhani'", fontSize: 15, fontWeight: 700, letterSpacing: 1,
                        color: isOpen ? textMain : (darkMode ? "rgba(255,255,255,0.75)" : "#1a2340"),
                      }}>{phase.sublabel}</span>
                    </div>
                    <div style={{
                      fontFamily: "'Share Tech Mono'", fontSize: 8,
                      color: textMuted, letterSpacing: 0.5, marginBottom: 5,
                    }}>{phase.subtitle}</div>
                    {/* XP + Hours badges */}
                    <div style={{ display: "flex", gap: 6, marginBottom: 6 }}>
                      <span style={{
                        fontFamily: "'Share Tech Mono'", fontSize: 7, letterSpacing: 1,
                        padding: "1px 6px", borderRadius: 2,
                        background: `${phase.color}${darkMode ? "15" : "25"}`, color: phase.color,
                        border: `1px solid ${phase.color}30`,
                      }}>{phaseXP} XP</span>
                      <span style={{
                        fontFamily: "'Share Tech Mono'", fontSize: 7, letterSpacing: 1,
                        padding: "1px 6px", borderRadius: 2,
                        background: darkMode ? "rgba(255,255,255,0.04)" : "rgba(0,0,0,0.08)", color: textMuted,
                        border: `1px solid ${borderMuted}`,
                      }}>~{phaseHours}h</span>
                    </div>
                    <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                      <div style={{ flex: 1, height: 2, background: darkMode ? "rgba(255,255,255,0.06)" : "rgba(0,0,0,0.12)", borderRadius: 1, overflow: "hidden" }}>
                        <div style={{
                          height: "100%", width: `${pct}%`,
                          background: allDone ? "#22c55e" : phase.color,
                          transition: "width 0.4s ease",
                          boxShadow: pct > 0 ? `0 0 6px ${phase.color}` : "none",
                        }} />
                      </div>
                      <span style={{
                        fontFamily: "'Share Tech Mono'", fontSize: 8,
                        color: allDone ? "#22c55e" : isOpen ? phase.color : textMuted,
                        letterSpacing: 1, flexShrink: 0,
                      }}>{doneCnt}/{phase.items.length}</span>
                    </div>
                  </div>

                  <div style={{ flexShrink: 0, textAlign: "right", display: "flex", flexDirection: "column", alignItems: "flex-end", gap: 2 }}>
                    <div style={{ fontFamily: "'Share Tech Mono'", fontSize: 7, color: darkMode ? textMuted : "rgba(0,0,0,0.6)", letterSpacing: 2 }}>TARGET</div>
                    <div style={{
                      fontFamily: "'Rajdhani'", fontSize: 12, fontWeight: 700,
                      color: isOpen ? phase.color : textMuted,
                      whiteSpace: "nowrap", transition: "color 0.3s",
                    }}>{phase.salary}</div>
                    <div style={{
                      fontSize: 16, marginTop: 4,
                      color: isOpen ? phase.color : "rgba(255,255,255,0.15)",
                      transform: isOpen ? "rotate(180deg)" : "rotate(0)",
                      transition: "transform 0.25s, color 0.2s",
                    }}>⌄</div>
                  </div>
                </div>

                {/* Items */}
                {isOpen && (
                  <div style={{ background: darkMode ? "rgba(0,0,0,0.55)" : "#dce8f4", animation: "fadeSlide 0.2s ease" }}>
                    {phase.items.map((item, idx) => {
                      const key = `${phase.id}-${idx}`;
                      const done = completed.has(key);
                      const diff = DIFFICULTY[item.diff];
                      return (
                        <div key={idx} onClick={() => toggle(phase.id, idx)} style={{
                          display: "flex", alignItems: "center", gap: 12,
                          padding: "12px 16px",
                          borderBottom: idx < phase.items.length - 1 ? `1px solid ${borderSub}` : "none",
                          background: done ? `${phase.color}09` : "transparent",
                          cursor: "pointer", userSelect: "none", transition: "background 0.15s",
                        }}>

                          {/* Checkbox */}
                          <div style={{
                            width: 20, height: 20, borderRadius: 5, flexShrink: 0,
                            border: `1.5px solid ${done ? phase.color : borderMuted}`,
                            background: done ? phase.color : (darkMode ? "rgba(0,0,0,0.3)" : "rgba(0,0,0,0.06)"),
                            display: "flex", alignItems: "center", justifyContent: "center",
                            transition: "all 0.2s",
                            boxShadow: done ? `0 0 10px ${phase.color}55` : "none",
                          }}>
                            {done && (
                              <svg width="10" height="8" viewBox="0 0 10 8" fill="none">
                                <path d="M1 4L3.5 6.5L9 1" stroke="#000" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"/>
                              </svg>
                            )}
                          </div>

                          {/* Text */}
                          <div style={{ flex: 1, minWidth: 0 }}>
                            <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 3, flexWrap: "wrap" }}>
                              <span style={{
                                fontFamily: "'Rajdhani'", fontSize: 13, fontWeight: 600, letterSpacing: 0.4,
                                color: done ? textMuted : textMain,
                                textDecoration: done ? "line-through" : "none",
                                textDecorationColor: "rgba(255,255,255,0.1)",
                                transition: "all 0.2s",
                              }}>{item.title}</span>
                              <Tag type={item.tag} light={!darkMode} />
                            </div>
                            <div style={{
                              fontFamily: "'Share Tech Mono'", fontSize: 9,
                              color: done ? (darkMode ? "rgba(255,255,255,0.1)" : "rgba(0,0,0,0.25)") : textMuted,
                              letterSpacing: 0.3, lineHeight: 1.5, marginBottom: 4,
                            }}>{item.desc}</div>
                            {/* Difficulty + Hours + XP */}
                            <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                              <Stars count={item.diff} color={diff.color} darkMode={darkMode} />
                              <span style={{
                                fontFamily: "'Share Tech Mono'", fontSize: 7,
                                color: diff.color, letterSpacing: 1, opacity: 0.8,
                              }}>{diff.label}</span>
                              <span style={{
                                fontFamily: "'Share Tech Mono'", fontSize: 7,
                                color: textMuted, letterSpacing: 1,
                              }}>~{item.hours}h</span>
                              <span style={{
                                fontFamily: "'Share Tech Mono'", fontSize: 7,
                                color: phase.color, letterSpacing: 1, opacity: 0.8,
                              }}>+{XP_VALUES[item.tag]} XP</span>
                            </div>
                          </div>

                          {/* Index */}
                          <div style={{
                            fontFamily: "'Share Tech Mono'", fontSize: 8,
                            color: done ? phase.color : (darkMode ? textMuted : "rgba(0,0,0,0.35)"),
                            letterSpacing: 1, flexShrink: 0, transition: "color 0.2s",
                          }}>{String(idx + 1).padStart(2, "0")}</div>
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            );
          })}
        </div>

        {/* ══ COMPLETION BANNER ══ */}
        {progress === 100 && (
          <div style={{
            margin: "16px 16px 0", padding: "26px 20px", borderRadius: 10,
            background: "linear-gradient(135deg, rgba(168,85,247,0.12) 0%, rgba(0,212,255,0.06) 100%)",
            border: "1px solid rgba(168,85,247,0.45)",
            textAlign: "center", animation: "fadeUp 0.4s ease",
            boxShadow: "0 0 50px rgba(168,85,247,0.12)",
          }}>
            <div style={{ fontFamily: "'Share Tech Mono'", fontSize: 9, color: "#a855f7", letterSpacing: 4, marginBottom: 12 }}>
              // ROADMAP COMPLETE
            </div>
            <div style={{
              fontFamily: "'Orbitron'", fontSize: 20, fontWeight: 900,
              color: "#fff", marginBottom: 10, letterSpacing: 1,
              textShadow: "0 0 20px rgba(168,85,247,0.5)",
            }}>SENIOR SECURITY ENGINEER</div>
            <div style={{ fontFamily: "'Rajdhani'", fontSize: 13, fontWeight: 600, color: "rgba(255,255,255,0.4)", letterSpacing: 2 }}>
              DOD CLEARANCE ELIGIBLE · ARCHITECT TIER
            </div>
          </div>
        )}

        {/* ══ FOOTER ══ */}
        <div style={{
          margin: "30px 16px 0", padding: "16px 0 0",
          borderTop: darkMode ? "1px solid rgba(0,212,255,0.08)" : "1px solid rgba(0,0,0,0.12)",
          display: "flex", justifyContent: "space-between", alignItems: "center",
        }}>
          <div style={{ fontFamily: "'Orbitron'", fontSize: 9, fontWeight: 700, color: "#00d4ff", letterSpacing: 2, opacity: 0.75 }}>
            SECURITY ENGINEER PATH
          </div>
          <div style={{ fontFamily: "'Share Tech Mono'", fontSize: 8, color: textMuted, letterSpacing: 2 }}>
            {new Date().getFullYear()}
          </div>
        </div>

      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then(reg => console.log('SW registered:', reg.scope))
          .catch(err => console.log('SW error:', err));
      });
    }
  </script>
</body>
</html>
