  function getLevelInfo(xp) {
    let current=LEVELS[0], next=LEVELS[1];
    for(let i=LEVELS.length-1;i>=0;i--) {
      if(xp>=LEVELS[i].xpRequired){current=LEVELS[i];next=LEVELS[i+1]||null;break;}
    }
    const xpInLevel=xp-current.xpRequired;
    const xpNeeded=next?next.xpRequired-current.xpRequired:1;
    const pct=next?Math.round((xpInLevel/xpNeeded)*100):100;
    return{current,next,pct,xpInLevel,xpNeeded};
  }

  // ── RESUME EXPORT ────────────────────────────────────────
  function buildResume(completed,notes,completedDates,labHours){
    const lines=["CYBERSECURITY SKILLS — COMPLETED ROADMAP","=".repeat(48),""];
    PHASES.forEach(phase=>{
      const done=phase.items.filter((_,i)=>completed.has(`${phase.id}-${i}`));
      if(!done.length)return;
      lines.push(`${phase.label.toUpperCase()}: ${phase.sublabel.toUpperCase()} (${done.length}/${phase.items.length})`);
      lines.push("-".repeat(40));
      done.forEach(item=>{
        const idx=phase.items.indexOf(item);
        const key=`${phase.id}-${idx}`;
        const date=completedDates[key]?new Date(completedDates[key]).toLocaleDateString("en-US",{month:"short",year:"numeric"}):"";
        const lh=labHours[key]||0;
        lines.push(`• ${item.title}${date?` — completed ${date}`:""} [${item.tag}]${lh?` · ${lh}h lab time`:""}`);
        if(notes[key]&&notes[key].trim())lines.push(`  Note: ${notes[key].trim()}`);
      });
      lines.push("");
    });
    const totalLab=Object.values(labHours).reduce((a,b)=>a+b,0);
    if(totalLab>0)lines.push(`TOTAL LAB TIME LOGGED: ${totalLab} hours`);
    return lines.join("\n");
  }

  // ── TIME ESTIMATE ────────────────────────────────────────
  function getTimeEstimate(completed,completedDates){
    if(completed.size<3)return null;
    const dates=Object.values(completedDates).map(d=>new Date(d)).sort((a,b)=>a-b);
    if(dates.length<2)return null;
    const span=(dates[dates.length-1]-dates[0])/(1000*60*60*24);
    const rate=completed.size/Math.max(span,1);
    const totalItems=PHASES.reduce((a,p)=>a+p.items.length,0);
    const remaining=totalItems-completed.size;
    if(rate<=0||remaining<=0)return null;
    const daysLeft=Math.round(remaining/rate);
    if(daysLeft>365*3)return null;
    const target=new Date();target.setDate(target.getDate()+daysLeft);
    return{daysLeft,target:target.toLocaleDateString("en-US",{month:"long",year:"numeric"}),ratePerWeek:(rate*7).toFixed(1)};
  }


  // ── SEGMENTED BAR ──────────────────────────────────────
  function SegBar({pct,color,segments=10,height=8,complete=false,light=false}){
    const filled=Math.round((pct/100)*segments);
    const emptyColor=light?"rgba(0,0,0,0.10)":"rgba(255,255,255,0.08)";
    const doneColor=complete?"#34d399":color;
    return <div style={{display:"flex",gap:3,flex:1}}>
      {Array.from({length:segments},(_,i)=>(
        <div key={i} style={{flex:1,height,borderRadius:4,background:i<filled?doneColor:emptyColor,transition:`background 0.3s ${i*0.02}s`}}/>
      ))}
    </div>;
  }

            {timeEst
              ?<><div style={{fontFamily:"'IBM Plex Sans'",fontSize:28,fontWeight:700,color:activeColor,lineHeight:1,marginBottom:4}}>{timeEst.daysLeft}<span style={{fontSize:11,color:textMuted,fontWeight:400}}>d</span></div>
                <div style={{fontFamily:"'IBM Plex Mono'",fontSize:7,color:textMuted,letterSpacing:1}}>{timeEst.ratePerWeek}/wk · {timeEst.target}</div></>
              :<><div style={{fontFamily:"'IBM Plex Sans'",fontSize:28,fontWeight:700,color:textMuted,marginBottom:4}}>—</div>
                <div style={{fontFamily:"'IBM Plex Mono'",fontSize:7,color:textMuted,letterSpacing:1}}>complete 3+ items</div></>}
          </div>
        </div>

        {/* ══ PHASE CARDS ══ */}
        <div style={{display:"flex",flexDirection:"column",gap:8,padding:"0 16px",animation:"fadeUp 0.5s 0.15s ease both"}}>
          {PHASES.map((phase,phaseIdx)=>{
            const isOpen=openPhase===phase.id;
            const doneCnt=phase.items.filter((_,i)=>completed.has(`${phase.id}-${i}`)).length;
            const pct=Math.round((doneCnt/phase.items.length)*100);
            const allDone=doneCnt===phase.items.length;
            const phaseXP=phase.items.reduce((s,i)=>s+(XP_VALUES[i.tag]||0),0);
            const phaseHours=phase.items.reduce((s,i)=>s+i.hours,0);
            const visibleCount=phase.items.filter((item,idx)=>{
              if(activeRole==="focus")return priorityItems.has(`${phase.id}-${idx}`);
              if(activeRole==="all")return true;
              return (activeRoleObj?.filter||((()=>true)))(item);
            }).length;
            if(activeRole!=="all"&&visibleCount===0)return null;
            return(
              <div key={phase.id} style={{borderRadius:R.lg,overflow:"hidden",border:`2px solid ${allDone?"#34d399":(isOpen?phase.color+"60":"rgba(255,255,255,0.08)")}`,transition:"border-color 0.3s,box-shadow 0.3s",boxShadow:isOpen?`0 0 30px ${phase.color}12,inset 0 1px 0 ${phase.color}12`:"none",animation:`fadeUp 0.5s ${0.2+phaseIdx*0.05}s ease both`}}>

                {/* Header */}
                <div className="phase-header" onClick={()=>setOpenPhase(isOpen?null:phase.id)}
                  style={{display:"flex",alignItems:"center",gap:14,padding:"14px 16px",background:isOpen?(darkMode?phase.dark:`${phase.color}18`):(darkMode?"rgba(255,255,255,0.02)":"#eeeeea"),cursor:"pointer",userSelect:"none",transition:"background 0.3s,filter 0.2s",borderBottom:isOpen?`1px solid ${phase.color}15`:"none"}}>

                  <div style={{position:"relative",flexShrink:0}}>
                    <ProgressRing pct={pct} color={phase.color} size={48} darkMode={darkMode} complete={allDone}/>
                    <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:17,color:isOpen?phase.color:darkMode?"rgba(255,255,255,0.18)":"rgba(0,0,0,0.25)",transition:"color 0.3s"}}>{phase.icon}</div>
                  </div>

                  <div style={{flex:1,minWidth:0}}>
                    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:2}}>
                      <span style={{fontFamily:"'IBM Plex Mono'",fontSize:9,color:isOpen?phase.color:textMuted,letterSpacing:3}}>{phase.label}</span>
                      <span style={{fontFamily:"'IBM Plex Sans'",fontSize:15,fontWeight:700,letterSpacing:0.5,color:allDone?"#34d399":(isOpen?textMain:(darkMode?"rgba(255,255,255,0.75)":"#111111"))}}>{phase.sublabel}</span>
                      {allDone&&<span style={{fontFamily:"'IBM Plex Mono'",fontSize:7,color:"#34d399",background:"rgba(52,211,153,0.1)",border:"1px solid rgba(52,211,153,0.25)",borderRadius:999,padding:"2px 7px",letterSpacing:1}}>DONE</span>}
                    </div>
                    <div style={{fontFamily:"'IBM Plex Sans'",fontSize:12,fontWeight:400,color:textMuted,letterSpacing:0.3,marginBottom:5,lineHeight:1.4}}>{phase.subtitle}</div>
                    <div style={{display:"flex",gap:6,marginBottom:6,flexWrap:"wrap"}}>
                      <span style={{fontFamily:"'IBM Plex Mono'",fontSize:7,letterSpacing:1,padding:"2px 7px",borderRadius:R.sm,background:`${phase.color}${darkMode?"14":"22"}`,color:phase.color,border:`1px solid ${phase.color}28`}}>{phaseXP} XP</span>
                      <span style={{fontFamily:"'IBM Plex Mono'",fontSize:7,letterSpacing:1,padding:"2px 7px",borderRadius:R.sm,background:darkMode?"rgba(255,255,255,0.04)":"rgba(0,0,0,0.06)",color:textMuted,border:`1px solid ${"rgba(255,255,255,0.08)"}`}}>~{phaseHours}h</span>
                      {activeRole!=="all"&&<span style={{fontFamily:"'IBM Plex Mono'",fontSize:7,letterSpacing:1,padding:"2px 7px",borderRadius:R.sm,background:"rgba(245,200,66,0.08)",color:"#f5c842",border:"1px solid rgba(245,200,66,0.18)"}}>{visibleCount} matching</span>}
                    </div>
                    <div style={{display:"flex",alignItems:"center",gap:8}}>
                      <div style={{flex:1,height:2,background:darkMode?"rgba(255,255,255,0.06)":"rgba(0,0,0,0.10)",borderRadius:1,overflow:"hidden"}}>
                        <div style={{height:"100%",width:`${pct}%`,background:allDone?"#34d399":phase.color,transition:"width 0.4s ease"}}/>
                      </div>
                      <span style={{fontFamily:"'IBM Plex Mono'",fontSize:8,color:allDone?"#34d399":isOpen?phase.color:textMuted,letterSpacing:1,flexShrink:0}}>{doneCnt}/{phase.items.length}</span>
                    </div>
                  </div>

                  <div className="phase-meta" style={{flexShrink:0,textAlign:"right",display:"flex",flexDirection:"column",alignItems:"flex-end",gap:2}}>
                    <div style={{fontFamily:"'IBM Plex Mono'",fontSize:7,color:textMuted,letterSpacing:2}}>TARGET</div>
                    <div style={{fontFamily:"'IBM Plex Sans'",fontSize:12,fontWeight:700,color:isOpen?phase.color:textMuted,whiteSpace:"nowrap",transition:"color 0.3s"}}>{phase.salary}</div>
                    <div style={{fontSize:16,marginTop:4,color:isOpen?phase.color:darkMode?"rgba(255,255,255,0.15)":"rgba(0,0,0,0.3)",transform:isOpen?"rotate(180deg)":"rotate(0)",transition:"transform 0.25s,color 0.2s"}}>⌄</div>
                  </div>
                </div>

                {/* Items */}
                {isOpen&&(
                  <div style={{background:darkMode?"rgba(0,0,0,0.52)":"#e8e8e4",animation:"fadeSlide 0.2s ease"}}>
                    {/* FIX #16: empty state if role filter matches nothing in open phase */}
                    {visibleCount===0&&activeRole!=="all"&&(
                      <div style={{padding:"20px 16px",fontFamily:"'IBM Plex Sans'",fontSize:13,color:textMuted,textAlign:"center"}}>
                        No {JOB_ROLES.find(r=>r.id===activeRole)?.label} skills in this phase.
                      </div>
                    )}
                    {phase.items.map((item,idx)=>{
                      const key=`${phase.id}-${idx}`;
                      const done=completed.has(key);
                      const diff=DIFFICULTY[item.diff];
                      const hasNote=notes[key]&&notes[key].trim();
                      const isPrio=priorityItems.has(key);
                      const completedDateStr=completedDates[key];
                      const lh=labHours[key]||0;
                      const isVisible=activeRole==="all"||(activeRole==="focus"?priorityItems.has(key):(activeRoleObj?.filter||(()=>true))(item));
                      const isExpiring=(()=>{const expiry=CERT_EXPIRY[item.title];if(!expiry||!completedDateStr)return false;const d=new Date(completedDateStr);d.setFullYear(d.getFullYear()+expiry);return(d-new Date())<1000*60*60*24*30*6;})();
                      return(
                        <div key={idx} className="phase-item"
                          style={{borderBottom:idx<phase.items.length-1?`1px solid ${borderSub}`:"none",background:done?`${phase.color}10`:"transparent",opacity:isVisible?1:0.2,borderLeft:done?`3px solid ${phase.color}60`:"3px solid transparent",transition:"opacity 0.2s,background 0.15s",position:"relative"}}>
                          {/* FIX #14: hover bar */}
                          <div className="item-hover-bar" style={{position:"absolute",left:0,top:0,bottom:0,width:3,background:phase.color,opacity:0,transition:"opacity 0.15s",borderRadius:"0 2px 2px 0"}}/>
                          <div style={{display:"flex",alignItems:"center",gap:10,padding:"12px 16px",cursor:"pointer",userSelect:"none"}}
                            onClick={()=>toggle(phase.id,idx)}>
                            {/* FIX #3: larger touch targets */}
                            <div style={{width:22,height:22,borderRadius:R.sm,flexShrink:0,border:`1.5px solid ${done?phase.color:"rgba(255,255,255,0.08)"}`,background:done?phase.color:(darkMode?"rgba(0,0,0,0.3)":"rgba(0,0,0,0.06)"),display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.2s",boxShadow:done?`0 0 12px ${phase.color}50`:"none"}}>
                              {done&&<svg width="11" height="9" viewBox="0 0 10 8" fill="none"><path d="M1 4L3.5 6.5L9 1" stroke="#000" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"/></svg>}
                            </div>
                            <div style={{flex:1,minWidth:0}}>
                              <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:3,flexWrap:"wrap"}}>
                                <span style={{fontFamily:"'IBM Plex Sans'",fontSize:14,fontWeight:600,letterSpacing:0.3,color:done?textMuted:textMain,textDecoration:done?"line-through":"none",textDecorationColor:darkMode?"rgba(255,255,255,0.25)":"rgba(0,0,0,0.3)",transition:"all 0.2s"}}>{item.title}</span>
                                <Tag type={item.tag} light={!darkMode}/>
                                {isPrio&&<span style={{fontSize:10}}>⭐</span>}
                                {isExpiring&&<span style={{fontFamily:"'IBM Plex Mono'",fontSize:7,color:"#f5c842",letterSpacing:1}}>⚠ RENEW</span>}
                              </div>
                              {/* FIX #9: consistent line height */}
                              <div style={{fontFamily:"'IBM Plex Sans'",fontSize:12,fontWeight:400,color:done?(darkMode?"rgba(255,255,255,0.12)":"rgba(0,0,0,0.25)"):textMuted,lineHeight:1.5,marginBottom:4}}>{item.desc}</div>
                              <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
                                <Stars count={item.diff} color={diff.color} darkMode={darkMode}/>
                                <span style={{fontFamily:"'IBM Plex Mono'",fontSize:7,color:diff.color,letterSpacing:1,opacity:0.85}}>{diff.label}</span>
                                <span style={{fontFamily:"'IBM Plex Mono'",fontSize:7,color:textMuted,letterSpacing:1}}>~{item.hours}h</span>
                                <span style={{fontFamily:"'IBM Plex Mono'",fontSize:7,color:phase.color,letterSpacing:1,opacity:0.85}}>+{XP_VALUES[item.tag]} XP</span>
                                {completedDateStr&&<span style={{fontFamily:"'IBM Plex Mono'",fontSize:7,color:"#34d399",letterSpacing:1}}>{new Date(completedDateStr).toLocaleDateString("en-US",{month:"short",day:"numeric"})}</span>}
                                {lh>0&&<span style={{fontFamily:"'IBM Plex Mono'",fontSize:7,color:"#a78bfa",letterSpacing:1}}>{lh}h lab</span>}
                              </div>
                            </div>
                            {/* Detail + LOG buttons */}
                            <div style={{display:"flex",flexDirection:"column",gap:2,flexShrink:0}}>
                              <button
                                onClick={e=>{e.stopPropagation();setModalItem({item,phaseId:phase.id,idx,phaseColor:phase.color});}}
                                style={{background:hasNote?`${phase.color}14`:"rgba(245,200,66,0.06)",border:`1px solid ${hasNote?phase.color+"40":"rgba(245,200,66,0.25)"}`,cursor:"pointer",padding:"3px 7px",borderRadius:R.sm,color:hasNote?phase.color:"#f5c842",transition:"all 0.2s",fontSize:13,lineHeight:1,minWidth:36,minHeight:36,display:"flex",alignItems:"center",justifyContent:"center"}}
                                title="Notes & details">
                                {hasNote?"📝":"···"}
                              </button>
                              <button
                                onClick={e=>{e.stopPropagation();setModalItem({item,phaseId:phase.id,idx,phaseColor:phase.color});}}
                                style={{background:lh>0?"rgba(245,200,66,0.10)":"rgba(245,200,66,0.06)",border:`1px solid ${lh>0?"rgba(245,200,66,0.4)":"rgba(245,200,66,0.25)"}`,cursor:"pointer",padding:"2px 6px",borderRadius:R.sm,color:"#f5c842",transition:"all 0.2s",fontSize:9,lineHeight:1,minWidth:36,minHeight:28,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'IBM Plex Mono'",letterSpacing:0.5}}
                                title="Log lab hours">
                                {lh>0?`${lh}h`:"LOG"}
                              </button>
                              <button
                                onClick={e=>{e.stopPropagation();const alreadyIn=customItems.some(c=>c.ref===`${phase.id}-${idx}`);if(alreadyIn){setCustomItems(prev=>prev.filter(c=>c.ref!==`${phase.id}-${idx}`));}else{setCustomItems(prev=>[...prev,{id:Date.now(),title:item.title,desc:item.desc,tag:item.tag,diff:item.diff,hours:item.hours,ref:`${phase.id}-${idx}`,phaseColor:phase.color}]);}}}
                                style={{background:"none",border:"none",cursor:"pointer",padding:"4px 8px",borderRadius:R.sm,color:customItems.some(c=>c.ref===`${phase.id}-${idx}`)?"#f5c842":textMuted,transition:"color 0.2s",fontSize:11,lineHeight:1,minWidth:28,minHeight:28,display:"flex",alignItems:"center",justifyContent:"center"}}
                                title="Add to My Phase">
                                {customItems.some(c=>c.ref===`${phase.id}-${idx}`)?"★":"☆"}
                              </button>
                            </div>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            );
          })}
        </div>

        {/* ══ CUSTOM PHASE EXPANDED ══ */}
        <div style={{margin:"0 0 8px",padding:"0 16px"}}>
          <div style={{borderRadius:14,overflow:"hidden",border:`2px solid ${showCustomPhase?"rgba(245,200,66,0.4)":"transparent"}`,transition:"border-color 0.3s",display:showCustomPhase?"block":"none"}}>
            <div style={{padding:"12px 16px",background:darkMode?"rgba(245,200,66,0.05)":"rgba(245,200,66,0.03)",borderBottom:"1px solid rgba(245,200,66,0.12)",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <span style={{fontFamily:"'IBM Plex Mono'",fontSize:9,color:"#f5c842",letterSpacing:2}}>PH06 · MY PHASE · {customItems.length} items</span>
              <button onClick={()=>setShowCustomPhase(false)} style={{background:"none",border:"none",color:textMuted,cursor:"pointer",fontSize:18,lineHeight:1}}>×</button>
            </div>
            {showCustomPhase&&(
              <div style={{background:darkMode?"rgba(0,0,0,0.4)":"#f0f0ea",animation:"fadeSlide 0.2s ease"}}>
                {/* Add custom item input */}
                <div style={{padding:"12px 16px",borderBottom:`1px solid ${darkMode?"rgba(255,255,255,0.05)":"rgba(0,0,0,0.07)"}`,display:"flex",gap:8,alignItems:"center"}}>
                  <input
                    value={customInput}
                    onChange={e=>setCustomInput(e.target.value)}
                    onKeyDown={e=>{if(e.key==="Enter"&&customInput.trim()){setCustomItems(prev=>[...prev,{id:Date.now(),title:customInput.trim(),desc:"Custom item",tag:"SKILL",diff:2,hours:0,ref:null,phaseColor:"#f5c842"}]);setCustomInput("");}}}
                    placeholder="Add a custom skill or goal..."
                    style={{flex:1,background:darkMode?"rgba(255,255,255,0.04)":"rgba(0,0,0,0.04)",border:"2px solid rgba(245,200,66,0.2)",borderRadius:10,padding:"8px 12px",color:textMain,fontFamily:"'IBM Plex Mono'",fontSize:11,outline:"none"}}
                  />
                  <button onClick={()=>{if(customInput.trim()){setCustomItems(prev=>[...prev,{id:Date.now(),title:customInput.trim(),desc:"Custom item",tag:"SKILL",diff:2,hours:0,ref:null,phaseColor:"#f5c842"}]);setCustomInput("");}}}
                    style={{background:"rgba(245,200,66,0.12)",border:"2px solid rgba(245,200,66,0.3)",borderRadius:10,padding:"8px 14px",color:"#f5c842",fontFamily:"'IBM Plex Mono'",fontSize:10,cursor:"pointer",letterSpacing:1,whiteSpace:"nowrap"}}>+ ADD</button>
                </div>
                {customItems.length===0&&(
                  <div style={{padding:"24px 16px",textAlign:"center"}}>
                    <div style={{fontFamily:"'IBM Plex Sans'",fontSize:13,color:textMuted,marginBottom:4}}>No items yet</div>
                    <div style={{fontFamily:"'IBM Plex Mono'",fontSize:9,color:textMuted,letterSpacing:1}}>Tap ☆ on any skill above to add it here, or type a custom goal</div>
                  </div>
                )}
                {customItems.map((item,idx)=>{
                  const ckey=`custom-${item.id}`;
                  const done=completed.has(ckey);
                  return(
                    <div key={item.id} className="phase-item" style={{borderBottom:idx<customItems.length-1?`1px solid ${darkMode?"rgba(255,255,255,0.05)":"rgba(0,0,0,0.07)"}`:"none",background:done?"rgba(245,200,66,0.08)":"transparent",position:"relative",borderLeft:done?"3px solid rgba(245,200,66,0.5)":"3px solid transparent"}}>
                      <div style={{display:"flex",alignItems:"center",gap:10,padding:"12px 16px",cursor:"pointer",userSelect:"none"}} onClick={()=>{
                        setCompleted(prev=>{const n=new Set(prev);n.has(ckey)?n.delete(ckey):n.add(ckey);return n;});
                        if(!completed.has(ckey))setCompletedDates(d=>({...d,[ckey]:new Date().toISOString()}));
                        else setCompletedDates(d=>{const n={...d};delete n[ckey];return n;});
                      }}>
                        <div style={{width:22,height:22,borderRadius:6,flexShrink:0,border:`1.5px solid ${done?"#f5c842":"rgba(255,255,255,0.08)"}`,background:done?"#f5c842":(darkMode?"rgba(0,0,0,0.3)":"rgba(0,0,0,0.06)"),display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.2s"}}>
                          {done&&<svg width="11" height="9" viewBox="0 0 10 8" fill="none"><path d="M1 4L3.5 6.5L9 1" stroke="#000" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"/></svg>}
                        </div>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{fontFamily:"'IBM Plex Sans'",fontSize:14,fontWeight:600,color:done?textMuted:textMain,textDecoration:done?"line-through":"none",textDecorationColor:darkMode?"rgba(255,255,255,0.25)":"rgba(0,0,0,0.3)"}}>{item.title}</div>
                          {item.ref&&<div style={{fontFamily:"'IBM Plex Mono'",fontSize:8,color:textMuted,marginTop:2,letterSpacing:1}}>from {item.ref.split("-")[0].toUpperCase()}</div>}
                        </div>
                        <button onClick={e=>{e.stopPropagation();setCustomItems(prev=>prev.filter(c=>c.id!==item.id));}} style={{background:"none",border:"none",cursor:"pointer",padding:"6px 8px",color:textMuted,fontSize:14,lineHeight:1,minWidth:28,minHeight:28,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}} title="Remove">×</button>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        </div>

        {/* ══ COMPLETION BANNER ══ */}
        {progress===100&&(
          <div style={{margin:"16px 16px 0",padding:"26px 20px",borderRadius:12,background:"linear-gradient(135deg,rgba(168,85,247,0.12) 0%,rgba(245,200,66,0.06) 100%)",border:"2px solid rgba(168,85,247,0.45)",textAlign:"center",animation:"fadeUp 0.4s ease"}}>
            <div style={{fontFamily:"'IBM Plex Mono'",fontSize:9,color:"#a78bfa",letterSpacing:4,marginBottom:12}}>// ROADMAP COMPLETE</div>
            <div style={{fontFamily:"'IBM Plex Sans'",fontSize:20,fontWeight:900,color:"#fff",marginBottom:10,letterSpacing:1}}>SENIOR SECURITY ENGINEER</div>
            <div style={{fontFamily:"'IBM Plex Sans'",fontSize:14,fontWeight:600,color:darkMode?"rgba(255,255,255,0.45)":"rgba(0,0,0,0.4)",letterSpacing:2}}>DOD CLEARANCE ELIGIBLE · ARCHITECT TIER</div>
          </div>
        )}

        {/* ══ FOOTER — FIX #20: summary stats ══ */}
        <div style={{margin:"24px 16px 0",padding:"16px 0 20px",borderTop:darkMode?"2px solid rgba(245,200,66,0.08)":"2px solid rgba(0,0,0,0.08)",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
          <div style={{fontFamily:"'IBM Plex Mono'",fontSize:9,color:"#f5c842",letterSpacing:3,opacity:0.7}}>SECURITY ENGINEER PATH</div>
          <div style={{display:"flex",gap:12}}>
            <div style={{fontFamily:"'IBM Plex Mono'",fontSize:8,color:textMuted,letterSpacing:1}}>{doneCount}/{totalItems} skills</div>
            <div style={{fontFamily:"'IBM Plex Mono'",fontSize:8,color:textMuted,letterSpacing:1}}>{totalXP.toLocaleString()} XP</div>
            {totalLabLogged>0&&<div style={{fontFamily:"'IBM Plex Mono'",fontSize:8,color:"#a78bfa",letterSpacing:1}}>{totalLabLogged}h lab</div>}
          </div>
        </div>

      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>

<script>
  if('serviceWorker' in navigator){
    window.addEventListener('load',()=>{
      navigator.serviceWorker.register('sw.js')
        .then(reg=>console.log('SW:',reg.scope))
        .catch(err=>console.log('SW err:',err));
    });
  }
</script>
</body>
</html>
